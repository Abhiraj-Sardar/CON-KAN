
<style>
  .demo-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2rem;
    padding: 3rem 1rem;
  }

  .toggle-label {
    font-size: 13px;
    color: var(--color-text-secondary);
    letter-spacing: 0.04em;
  }

  .theme-toggle {
    --w: 64px;
    --h: 32px;
    --knob: 24px;
    --gap: 4px;
    position: relative;
    width: var(--w);
    height: var(--h);
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  .theme-toggle input {
    position: absolute;
    opacity: 0;
    width: 0;
    height: 0;
  }

  .track {
    position: absolute;
    inset: 0;
    border-radius: 999px;
    background: #1a1a2e;
    border: 0.5px solid rgba(255,255,255,0.12);
    transition: background 0.4s ease;
    overflow: hidden;
  }

  .stars {
    position: absolute;
    inset: 0;
    transition: opacity 0.3s ease;
  }

  .star {
    position: absolute;
    background: #fff;
    border-radius: 50%;
    animation: twinkle 2s infinite alternate;
  }

  .s1 { width: 2px; height: 2px; top: 6px; left: 10px; animation-delay: 0s; }
  .s2 { width: 1.5px; height: 1.5px; top: 18px; left: 18px; animation-delay: 0.4s; }
  .s3 { width: 2px; height: 2px; top: 10px; left: 28px; animation-delay: 0.8s; }
  .s4 { width: 1px; height: 1px; top: 22px; left: 8px; animation-delay: 0.2s; }

  @keyframes twinkle {
    from { opacity: 0.4; transform: scale(1); }
    to   { opacity: 1;   transform: scale(1.4); }
  }

  .sun-rays {
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.3s ease;
  }

  .ray {
    position: absolute;
    background: #f9a825;
    border-radius: 1px;
  }

  .ray-h { width: 6px; height: 1.5px; top: 50%; transform: translateY(-50%); }
  .ray-v { width: 1.5px; height: 6px; left: 50%; transform: translateX(-50%); }
  .ray-d1, .ray-d2 { width: 5px; height: 1.5px; top: 50%; }

  .ray-left  { right: 4px; }
  .ray-right { left: 4px; }
  .ray-top   { bottom: 2px; }
  .ray-bot   { top: 2px; }

  .knob {
    position: absolute;
    top: var(--gap);
    left: var(--gap);
    width: var(--knob);
    height: var(--knob);
    border-radius: 50%;
    background: #f0c040;
    transition: transform 0.4s cubic-bezier(.34,1.56,.64,1), background 0.3s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: inset -3px -2px 0 0 rgba(0,0,0,0.15);
  }

  .crescent {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #c8901a;
    position: absolute;
    top: 3px;
    right: 3px;
    clip-path: circle(50% at 60% 50%);
    transition: opacity 0.3s ease;
  }

  .theme-toggle input:checked ~ .track {
    background: #e8f4fd;
    border-color: rgba(0,0,0,0.08);
  }

  .theme-toggle input:checked ~ .track .stars {
    opacity: 0;
  }

  .theme-toggle input:checked ~ .track .sun-rays {
    opacity: 1;
  }

  .theme-toggle input:checked ~ .knob {
    transform: translateX(calc(var(--w) - var(--knob) - var(--gap) * 2));
    background: #ffca28;
    box-shadow: none;
  }

  .theme-toggle input:checked ~ .knob .crescent {
    opacity: 0;
  }

  .theme-toggle:focus-within .knob {
    outline: 2px solid #4a90d9;
    outline-offset: 2px;
  }

  .status-text {
    font-size: 14px;
    font-weight: 500;
    color: var(--color-text-primary);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .mode-icon {
    font-size: 16px;
  }

  .code-hint {
    font-size: 12px;
    color: var(--color-text-tertiary);
    font-family: var(--font-mono);
    background: var(--color-background-secondary);
    padding: 8px 14px;
    border-radius: var(--border-radius-md);
    border: 0.5px solid var(--color-border-tertiary);
    margin-top: 0.5rem;
  }
</style>

<div class="demo-wrap">
  <span class="toggle-label">theme toggle</span>

  <label class="theme-toggle" aria-label="Toggle light and dark theme">
    <input type="checkbox" id="tog" role="switch" aria-checked="false" />
    <div class="track">
      <div class="stars">
        <div class="star s1"></div>
        <div class="star s2"></div>
        <div class="star s3"></div>
        <div class="star s4"></div>
      </div>
      <div class="sun-rays">
        <div class="ray ray-h ray-left"></div>
        <div class="ray ray-h ray-right"></div>
        <div class="ray ray-v ray-top"></div>
        <div class="ray ray-v ray-bot"></div>
      </div>
    </div>
    <div class="knob">
      <div class="crescent"></div>
    </div>
  </label>

  <div class="status-text" id="status">
    <i class="ti ti-moon mode-icon" aria-hidden="true"></i>
    <span id="mode-label">Dark mode</span>
  </div>

  <div class="code-hint" id="code-out">data-theme="dark"</div>
</div>

<script>
  const tog = document.getElementById('tog');
  const modeLabel = document.getElementById('mode-label');
  const modeIcon = document.querySelector('.mode-icon');
  const codeOut = document.getElementById('code-out');

  tog.addEventListener('change', () => {
    const isLight = tog.checked;
    tog.setAttribute('aria-checked', isLight);
    modeLabel.textContent = isLight ? 'Light mode' : 'Dark mode';
    modeIcon.className = isLight ? 'ti ti-sun mode-icon' : 'ti ti-moon mode-icon';
    codeOut.textContent = isLight ? 'data-theme="light"' : 'data-theme="dark"';
  });
</script>
